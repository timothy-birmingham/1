<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Equipment Tracking System</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<h1>Onboarding Equipment Tracker</h1>

<div class="card">
  <h2>Add New Hire</h2>

  <input id="name" placeholder="Name" />

  <select id="role">
    <option value="">Select Role</option>
    <option value="CAM">CAM</option>
    <option value="Accountant">Accountant</option>
  </select>

  <input id="startDate" type="date" />
  <textarea id="notes" placeholder="Notes"></textarea>

  <button onclick="addHire()">Add Hire</button>
</div>

<div class="card">
  <h2>Add Equipment Request (Existing Hire)</h2>

  <select id="hireSelect"></select>

  <input id="equipment" placeholder="Equipment name" />

  <select id="status">
    <option>Not Reviewed</option>
    <option>Approved</option>
    <option>Ordered</option>
    <option>Received</option>
    <option>Assigned</option>
  </select>

  <button onclick="addRequest()">Add Request</button>
</div>

<div class="card">
  <h2>New Hires</h2>
  <ul id="hireList"></ul>
</div>

<div class="card">
  <h2>Orders</h2>
  <div id="ordersContainer"></div>
</div>

<script>
let hires = [];
let orders = [];

// Equipment templates
const equipmentTemplates = {
  "CAM": [
    "Monitor",
    "Monitor",
    "Laptop",
    "Docking Station",
    "Keyboard + Mouse Combo"
  ],
  "Accountant": [
    "Monitor",
    "Monitor",
    "Laptop (10-key)",
    "Docking Station",
    "Keyboard + Mouse Combo"
  ]
};

// Add New Hire + Create Order
function addHire() {
  const name = document.getElementById("name").value;
  const role = document.getElementById("role").value;
  const startDate = document.getElementById("startDate").value;
  const notes = document.getElementById("notes").value;

  if (!name || !role) return alert("Fill required fields");

  const hire = {
    id: Date.now(),
    name,
    role,
    startDate,
    notes
  };

  hires.push(hire);

  // Create Order
  const orderId = Date.now();

  const newOrder = {
    orderId,
    hireName: name,
    items: []
  };

  // Auto-populate equipment
  equipmentTemplates[role].forEach(item => {
    newOrder.items.push({
      equipment: item,
      status: "Not Reviewed"
    });
  });

  orders.push(newOrder);

  updateUI();
}

// Add request to EXISTING hire/order
function addRequest() {
  const hireId = document.getElementById("hireSelect").value;
  const equipment = document.getElementById("equipment").value;
  const status = document.getElementById("status").value;

  if (!hireId || !equipment) return alert("Fill all fields");

  const hire = hires.find(h => h.id == hireId);
  const order = orders.find(o => o.hireName === hire.name);

  order.items.push({
    equipment,
    status
  });

  updateUI();
}

// UI rendering
function updateUI() {
  const hireList = document.getElementById("hireList");
  const hireSelect = document.getElementById("hireSelect");
  const ordersContainer = document.getElementById("ordersContainer");

  hireList.innerHTML = "";
  hireSelect.innerHTML = "";
  ordersContainer.innerHTML = "";

  hires.forEach(h => {
    // Hire list
    const li = document.createElement("li");
    li.innerHTML = `
      <strong>${h.name}</strong> (${h.role})<br>
      Start: ${h.startDate || "N/A"}<br>
      Notes: ${h.notes || "None"}
    `;
    hireList.appendChild(li);

    // Dropdown
    const option = document.createElement("option");
    option.value = h.id;
    option.textContent = h.name;
    hireSelect.appendChild(option);
  });

  // Render grouped orders
  orders.forEach(order => {
    const div = document.createElement("div");
    div.className = "order";

    let itemsHTML = "";

    order.items.forEach(item => {
      itemsHTML += `
        <tr>
          <td>${item.equipment}</td>
          <td>
            <select onchange="updateStatus(${order.orderId}, '${item.equipment}', this)">
              ${["Not Reviewed","Approved","Ordered","Received","Assigned"].map(s =>
                `<option ${item.status === s ? "selected" : ""}>${s}</option>`
              ).join("")}
            </select>
          </td>
        </tr>
      `;
    });

    div.innerHTML = `
      <h3>Order #${order.orderId} - ${order.hireName}</h3>
      <table>
        <tr><th>Equipment</th><th>Status</th></tr>
        ${itemsHTML}
      </table>
    `;

    ordersContainer.appendChild(div);
  });
}

// Update item status
function updateStatus(orderId, equipment, select) {
  const order = orders.find(o => o.orderId === orderId);
  const item = order.items.find(i => i.equipment === equipment);

  item.status = select.value;
}
</script>

</body>
</html>
