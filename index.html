<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Equipment Tracking System</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <h1>Onboarding Equipment Tracker</h1>

  <!-- New Hire Form -->
  <div class="card">
    <h2>Add New Hire</h2>
    
    <input id="name" placeholder="Name" />

    <select id="role" onchange="populateEquipment()">
      <option value="">Select Role</option>
      <option value="CAM">CAM</option>
      <option value="Accountant">Accountant</option>
    </select>

    <input id="startDate" type="date" />

    <textarea id="notes" placeholder="Notes"></textarea>

    <button onclick="addHire()">Add Hire</button>
  </div>

  <!-- Equipment Request Form -->
  <div class="card">
    <h2>Request Equipment</h2>
    <select id="hireSelect"></select>

    <select id="equipmentList"></select>

    <select id="status">
      <option>Not Reviewed</option>
      <option>Approved</option>
      <option>Ordered</option>
      <option>Received</option>
      <option>Assigned</option>
    </select>

    <button onclick="addRequest()">Add Request</button>
  </div>

  <!-- Data Tables -->
  <div class="card">
    <h2>New Hires</h2>
    <ul id="hireList"></ul>
  </div>

  <div class="card">
    <h2>Equipment Requests</h2>
    <table>
      <thead>
        <tr>
          <th>Hire</th>
          <th>Equipment</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="requestTable"></tbody>
    </table>
  </div>

  <script>
    let hires = [];
    let requests = [];

    // Role-based templates
    const equipmentTemplates = {
      "CAM": [
        "Monitor",
        "Monitor",
        "Laptop",
        "Docking Station",
        "Keyboard + Mouse Combo"
      ],
      "Accountant": [
        "Monitor",
        "Monitor",
        "Laptop (with 10-key)",
        "Docking Station",
        "Keyboard + Mouse Combo"
      ]
    };

    function populateEquipment() {
      const role = document.getElementById("role").value;
      const equipmentList = document.getElementById("equipmentList");

      equipmentList.innerHTML = "";

      if (!equipmentTemplates[role]) return;

      equipmentTemplates[role].forEach(item => {
        const option = document.createElement("option");
        option.textContent = item;
        option.value = item;
        equipmentList.appendChild(option);
      });
    }

    function addHire() {
      const name = document.getElementById("name").value;
      const role = document.getElementById("role").value;
      const startDate = document.getElementById("startDate").value;
      const notes = document.getElementById("notes").value;

      if (!name || !role) return alert("Please fill required fields");

      const hire = {
        id: Date.now(),
        name,
        role,
        startDate,
        notes
      };

      hires.push(hire);

      // Auto-create equipment requests
      if (equipmentTemplates[role]) {
        equipmentTemplates[role].forEach(item => {
          requests.push({
            hireName: name,
            equipment: item,
            status: "Not Reviewed"
          });
        });
      }

      updateUI();
    }

    function addRequest() {
      const hireId = document.getElementById("hireSelect").value;
      const equipment = document.getElementById("equipmentList").value;
      const status = document.getElementById("status").value;

      if (!hireId || !equipment) return alert("Fill all fields");

      const hire = hires.find(h => h.id == hireId);

      requests.push({
        hireName: hire.name,
        equipment,
        status
      });

      updateUI();
    }

    function updateUI() {
      const hireList = document.getElementById("hireList");
      const hireSelect = document.getElementById("hireSelect");

      hireList.innerHTML = "";
      hireSelect.innerHTML = "";

      hires.forEach(h => {
        const li = document.createElement("li");
        li.innerHTML = `
          <strong>${h.name}</strong> (${h.role})<br>
          Start: ${h.startDate || "N/A"}<br>
          Notes: ${h.notes || "None"}
        `;
        hireList.appendChild(li);

        const option = document.createElement("option");
        option.value = h.id;
        option.textContent = h.name;
        hireSelect.appendChild(option);
      });

      const table = document.getElementById("requestTable");
      table.innerHTML = "";

      requests.forEach(r => {
        const row = document.createElement("tr");

        row.innerHTML = `
          <td>${r.hireName}</td>
          <td>${r.equipment}</td>
          <td>
            <select onchange="updateStatus(this, '${r.hireName}', '${r.equipment}')">
              ${["Not Reviewed","Approved","Ordered","Received","Assigned"].map(s =>
                `<option ${r.status === s ? "selected" : ""}>${s}</option>`
              ).join("")}
            </select>
          </td>
        `;

        table.appendChild(row);
      });
    }

    function updateStatus(select, hireName, equipment) {
      const req = requests.find(r =>
        r.hireName === hireName && r.equipment === equipment
      );
      req.status = select.value;
    }
  </script>

</body>
</html>
